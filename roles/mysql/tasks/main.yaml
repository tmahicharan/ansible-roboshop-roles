- name: mysql conf
  hosts: mysql
  become: yes
  tasks:
- name: install mysql
  ansible.builtin.package:
   name: mysql-server
   state: present
  
- name: start and enable mysql
  ansible.builtin.service:
    name: mysqld
    state: started
    enabled: yes

- name: set passwoed
  ansible.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1
